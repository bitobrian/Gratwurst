name: Package World of Warcraft addon

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Addon version'
        required: true

jobs:
  package:
    name: Create zips and tag
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Resolve version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          version="${GITHUB_REF_NAME}"
        else
          version="${{ github.event.inputs.version }}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be semver (X.Y.Z), got: '${version}'" >&2
            exit 1
          fi
        fi
        echo "version=${version}" >> $GITHUB_OUTPUT

    - name: Package addon
      id: init
      run: |
        bash package.sh "${{ steps.version.outputs.version }}"
        addon_name=$(basename *.toc .toc)
        tag_name=${addon_name}-release-v${{ steps.version.outputs.version }}
        echo "addon_name=${addon_name}" >> $GITHUB_OUTPUT
        echo "tag_name=${tag_name}" >> $GITHUB_OUTPUT

    - name: Tag this version and upload release
      uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
      with:
        tag_name: ${{ steps.init.outputs.tag_name }}
        name: ${{ steps.init.outputs.addon_name }} ${{ steps.version.outputs.version }}
        body: ${{ steps.init.outputs.addon_name }} ${{ steps.version.outputs.version }}
        draft: false
        prerelease: false
        files: .releases/${{ steps.init.outputs.tag_name }}.zip
