name: Package World of Warcraft addon

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Addon version'
        required: true

jobs:
  package:
    name: Create zips and tag
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Resolve version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          version="${GITHUB_REF_NAME#v}"
        else
          version="${{ github.event.inputs.version }}"
        fi
        echo "version=${version}" >> $GITHUB_OUTPUT

    - name: Package addon
      id: init
      run: |
        bash package.sh "${{ steps.version.outputs.version }}"
        addon_name=$(basename *.toc .toc)
        tag_name=${addon_name}-release-v${{ steps.version.outputs.version }}
        echo "addon_name=${addon_name}" >> $GITHUB_OUTPUT
        echo "tag_name=${tag_name}" >> $GITHUB_OUTPUT

    - name: Tag this version and upload release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.init.outputs.tag_name }}
        name: ${{ steps.init.outputs.addon_name }} ${{ steps.version.outputs.version }}
        body: ${{ steps.init.outputs.addon_name }} ${{ steps.version.outputs.version }}
        draft: false
        prerelease: false
        files: .releases/${{ steps.init.outputs.tag_name }}.zip
