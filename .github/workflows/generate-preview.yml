name: Package Preview Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Preview version'
        required: true

jobs:
  generate-preview:
    name: Create preview release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Get name of addon
      id: init
      run: |
        addon_name=$(ls *.toc)
        addon_name=$(basename $addon_name .toc)
        tag_name=${addon_name}-preview-v${{github.event.inputs.version}}
        echo "addon_name=${addon_name}" >> $GITHUB_OUTPUT
        echo "tag_name=${tag_name}" >> $GITHUB_OUTPUT

    - name: Make folder for zips
      run: |
        mkdir -p .releases/${{steps.init.outputs.addon_name}}
        cp ${{steps.init.outputs.addon_name}}.lua .releases/${{steps.init.outputs.addon_name}}
        cp ${{steps.init.outputs.addon_name}}.toc .releases/${{steps.init.outputs.addon_name}}
        cp ${{steps.init.outputs.addon_name}}.xml .releases/${{steps.init.outputs.addon_name}}
        if [ -d "media" ]; then
          cp -R media .releases/${{steps.init.outputs.addon_name}}/
        fi

    - name: Create preview zip
      run: |
        cd .releases
        zip -9 -r ${{steps.init.outputs.tag_name}}.zip ${{steps.init.outputs.addon_name}}
        cd ..

    - name: Create preview release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{steps.init.outputs.tag_name}}
        release_name: ${{steps.init.outputs.addon_name}} Preview v${{github.event.inputs.version}}
        body: Preview release of ${{steps.init.outputs.addon_name}} v${{github.event.inputs.version}}
        draft: false
        prerelease: true

    - name: Upload preview zip to release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: .releases/${{steps.init.outputs.tag_name}}.zip
        asset_name: ${{steps.init.outputs.tag_name}}.zip
        asset_content_type: application/zip 